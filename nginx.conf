server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # PWA critical files - NEVER cache (must always fetch fresh)
    # This prevents installed PWAs from showing stale content
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Flutter web SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        # Default: no aggressive caching for HTML
        add_header Cache-Control "no-cache";
    }

    # Fix Flutter web asset paths - redirect /assets/X to /assets/assets/X
    location ~ ^/assets/([^/]+\.(png|jpg|jpeg|gif|svg|webp))$ {
        try_files $uri /assets/assets/$1 =404;
    }

    # Health check endpoint
    location /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Proxy API calls to B2C backend (internal Docker network)
    location /api/ {
        proxy_pass http://b2c-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Cache fingerprinted static assets (fonts, images, canvaskit)
    # These have content hashes in filenames so safe to cache long-term
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # JS/CSS - short cache with revalidation (main.dart.js changes on every build)
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Images in assets - moderate cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
