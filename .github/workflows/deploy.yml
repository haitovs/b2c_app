name: Deploy B2C Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ---------------------------------------------------------
      # STEP 1: PREPARE & BUILD ON GITHUB
      # ---------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web Release
        run: |
          flutter build web --release \
            --dart-define=B2C_API_URL=https://b2c.oguzforum.com \
            --dart-define=TOURISM_API_URL=https://api.turkmenchina.com

      # ---------------------------------------------------------
      # STEP 2: PREPARE SERVER (Self-Healing Sync)
      # ---------------------------------------------------------
      - name: Sync Config Files via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -Eeuo pipefail
            export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_b2c_app -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new'
            
            APP_DIR="/home/main/apps/b2c_app"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            
            # --- FIX: HEAL BROKEN REPO ---
            # If .git folder is missing (because SCP wiped it), re-initialize it.
            if [ ! -d ".git" ]; then
              echo "==> Repo missing or broken. Re-initializing..."
              git init
              git remote add origin git@github.com:haitovs/b2c_app.git || git remote set-url origin git@github.com:haitovs/b2c_app.git
            fi
            
            echo "==> Fetching latest configs..."
            git fetch --all --prune
            git reset --hard origin/main

      # ---------------------------------------------------------
      # STEP 3: UPLOAD BUILD + REBUILD CONTAINER
      # ---------------------------------------------------------
      - name: Deploy to server
        run: |
          # Write SSH key to temp file
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} -o StrictHostKeyChecking=accept-new"
          REMOTE="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          APP_DIR="/home/main/apps/b2c_app"

          # 1. Upload built web files as a tar stream (no SCP nesting issues)
          echo "==> Uploading build/web..."
          tar -cf - -C build web | ssh $SSH_OPTS "$REMOTE" "mkdir -p $APP_DIR/build && rm -rf $APP_DIR/build/web && tar -xf - -C $APP_DIR/build"

          # 2. Verify upload
          ssh $SSH_OPTS "$REMOTE" "ls $APP_DIR/build/web/index.html"

          # 3. Rebuild and restart container
          ssh $SSH_OPTS "$REMOTE" "
            set -Eeuo pipefail
            cd $APP_DIR

            if docker compose version >/dev/null 2>&1; then DC='docker compose'; else DC='docker-compose'; fi

            echo '==> Rebuilding...'
            \$DC build --no-cache b2c-frontend
            \$DC up -d --force-recreate b2c-frontend

            echo '==> Pruning...'
            docker image prune -f

            echo '==> Done!'
          "

          rm -f ~/.ssh/deploy_key